methods: Uses most recent historical data, and no bootstrapping was used. 
methods_long: Uses RW() and DRIFT() to make predictions. Both functions are from the fable package. Varying window sizes were used for the two functions, and the final prediction is an average of the two, as well as a seasonal component from the previous 4 seasons. Ideally, this seasonal component would assist in some shortcomings of the RW models.
